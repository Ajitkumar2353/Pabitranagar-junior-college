<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>🧮 Advanced Scientific Calculator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 20px;
    }

    /* Calculator container – compact but fully featured */
    .calc {
      max-width: 460px;
      width: 100%;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      padding: 1.2rem;
      box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Display */
    .display {
      background: #0f1722;
      border-radius: 1.5rem;
      padding: 1rem 1.2rem;
      margin-bottom: 1.5rem;
      box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.4);
    }

    .expression {
      width: 100%;
      background: transparent;
      border: none;
      color: #94a3b8;
      font-family: 'Fira Code', monospace;
      font-size: 1rem;
      text-align: right;
      outline: none;
      resize: none;
      overflow-y: auto;
      word-break: break-all;
    }

    .result {
      color: #f1f5f9;
      font-size: 2rem;
      font-weight: 700;
      font-family: monospace;
      text-align: right;
      word-break: break-word;
      border-top: 1px solid #334155;
      margin-top: 8px;
      padding-top: 8px;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
      gap: 10px;
      flex-wrap: wrap;
    }

    .mode-group {
      background: #1e293b;
      border-radius: 3rem;
      display: flex;
      padding: 2px;
    }

    .mode-btn {
      background: transparent;
      border: none;
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      font-size: 0.75rem;
      font-weight: bold;
      color: #cbd5e1;
      cursor: pointer;
      transition: 0.1s;
    }

    .mode-btn.active {
      background: #3b82f6;
      color: white;
      box-shadow: 0 1px 4px #3b82f680;
    }

    .mem-group {
      background: #1e293b;
      border-radius: 2rem;
      display: flex;
      gap: 4px;
      padding: 0 8px;
    }

    .mem-btn {
      background: transparent;
      border: none;
      padding: 0.3rem 0.7rem;
      border-radius: 2rem;
      color: #a5f3fc;
      font-weight: 600;
      font-size: 0.7rem;
      cursor: pointer;
    }

    .mem-btn:active {
      background: #334155;
    }

    /* Button grid */
    .buttons {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    button {
      background: #1e293b;
      border: none;
      padding: 12px 0;
      border-radius: 1.2rem;
      font-size: 1rem;
      font-weight: 600;
      color: #e2e8f0;
      cursor: pointer;
      transition: all 0.05s linear;
      font-family: monospace;
      box-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }

    button:active {
      transform: translateY(2px);
      background: #0f172a;
    }

    .func {
      background: #2d3a52;
      color: #7bc5ff;
      font-size: 0.85rem;
    }

    .op {
      background: #334155;
      color: #facc15;
      font-size: 1.2rem;
    }

    .equal {
      background: #3b82f6;
      color: white;
      font-size: 1.2rem;
    }

    .clear {
      background: #b91c1c;
      color: white;
    }

    .small-text {
      font-size: 0.75rem;
    }

    footer {
      font-size: 0.6rem;
      text-align: center;
      margin-top: 1.2rem;
      color: #64748b;
    }
  </style>
</head>
<body>
<div class="calc">
  <div class="display">
    <textarea class="expression" id="expr" rows="1" readonly placeholder="0"></textarea>
    <div class="result" id="result">0</div>
  </div>

  <div class="toolbar">
    <div class="mode-group">
      <button class="mode-btn active" id="degMode">DEG</button>
      <button class="mode-btn" id="radMode">RAD</button>
    </div>
    <div class="mem-group">
      <button class="mem-btn" id="memStore">MS</button>
      <button class="mem-btn" id="memRecall">MR</button>
      <button class="mem-btn" id="memPlus">M+</button>
      <button class="mem-btn" id="memClear">MC</button>
    </div>
  </div>

  <div class="buttons">
    <!-- Row 1 -->
    <button class="func" data-func="sin">sin</button>
    <button class="func" data-func="cos">cos</button>
    <button class="func" data-func="tan">tan</button>
    <button class="func" data-func="ln">ln</button>
    <button class="func" data-func="log">log</button>

    <!-- Row 2 -->
    <button class="func" data-func="asin">asin</button>
    <button class="func" data-func="acos">acos</button>
    <button class="func" data-func="atan">atan</button>
    <button class="func" data-func="sqrt">√</button>
    <button class="func" data-func="pow">xʸ</button>

    <!-- Row 3 -->
    <button data-num="7">7</button>
    <button data-num="8">8</button>
    <button data-num="9">9</button>
    <button class="op" data-op="/">÷</button>
    <button class="clear" data-action="clear">C</button>

    <!-- Row 4 -->
    <button data-num="4">4</button>
    <button data-num="5">5</button>
    <button data-num="6">6</button>
    <button class="op" data-op="*">×</button>
    <button class="func" data-action="del">⌫</button>

    <!-- Row 5 -->
    <button data-num="1">1</button>
    <button data-num="2">2</button>
    <button data-num="3">3</button>
    <button class="op" data-op="-">−</button>
    <button class="func" data-paren="(">(</button>

    <!-- Row 6 -->
    <button data-num="0">0</button>
    <button data-num=".">.</button>
    <button class="func" data-const="π">π</button>
    <button class="op" data-op="+">+</button>
    <button class="func" data-paren=")">)</button>

    <!-- Row 7 -->
    <button class="func" data-func="fact">n!</button>
    <button class="func" data-const="e">e</button>
    <button class="func" data-func="square">x²</button>
    <button class="func" data-func="cube">x³</button>
    <button class="equal" data-action="equal">=</button>
  </div>
  <footer>🔬 Advanced | DEG/RAD | Trig, Log, Factorial, Power | Memory</footer>
</div>

<script>
  (function() {
    // DOM elements
    const exprInput = document.getElementById('expr');
    const resultDiv = document.getElementById('result');
    
    // State
    let expression = "";
    let memory = 0;
    let isDeg = true;   // true = degrees, false = radians
    
    // Helper: update display
    function updateDisplay() {
      exprInput.value = expression === "" ? "0" : expression;
      exprInput.style.height = "auto";
      exprInput.style.height = Math.min(50, exprInput.scrollHeight) + "px";
    }
    
    // Evaluate safely
    function evaluate(expr) {
      if (expr.trim() === "") return "0";
      
      // Preprocess
      let str = expr;
      // constants
      str = str.replace(/π/g, 'Math.PI');
      str = str.replace(/\be\b/g, 'Math.E');
      // power operator
      str = str.replace(/\^/g, '**');
      // squares and cubes (x², x³)
      str = str.replace(/(\d+(?:\.\d+)?|\))\s*²/g, '$1**2');
      str = str.replace(/(\d+(?:\.\d+)?|\))\s*³/g, '$1**3');
      
      // factorial for numbers like 5!
      str = str.replace(/(\d+(?:\.\d+)?)\s*\!/g, function(match, num) {
        let n = parseFloat(num);
        if (isNaN(n) || n < 0 || Math.floor(n) !== n) return 'NaN';
        let f = 1;
        for (let i = 2; i <= n; i++) f *= i;
        return f;
      });
      // factorial for (expression)!
      str = str.replace(/\(([^()]+)\)\s*\!/g, function(match, inner) {
        try {
          let val = Function('"use strict"; return (' + inner + ')')();
          if (isNaN(val) || val < 0 || Math.floor(val) !== val) return 'NaN';
          let f = 1;
          for (let i = 2; i <= val; i++) f *= i;
          return f;
        } catch(e) { return 'NaN'; }
      });
      
      // Trig functions with degree/radian conversion
      const toRad = (deg) => deg * Math.PI / 180;
      const trigWrapper = (func, val) => {
        if (isDeg) {
          switch(func) {
            case 'sin': return Math.sin(toRad(val));
            case 'cos': return Math.cos(toRad(val));
            case 'tan': return Math.tan(toRad(val));
            case 'asin': return Math.asin(val) * 180 / Math.PI;
            case 'acos': return Math.acos(val) * 180 / Math.PI;
            case 'atan': return Math.atan(val) * 180 / Math.PI;
            default: return NaN;
          }
        } else {
          switch(func) {
            case 'sin': return Math.sin(val);
            case 'cos': return Math.cos(val);
            case 'tan': return Math.tan(val);
            case 'asin': return Math.asin(val);
            case 'acos': return Math.acos(val);
            case 'atan': return Math.atan(val);
            default: return NaN;
          }
        }
      };
      
      // Replace trig function calls with a custom evaluator
      let processed = str;
      processed = processed.replace(/sin\(/g, '$$sin$$(');
      processed = processed.replace(/cos\(/g, '$$cos$$(');
      processed = processed.replace(/tan\(/g, '$$tan$$(');
      processed = processed.replace(/asin\(/g, '$$asin$$(');
      processed = processed.replace(/acos\(/g, '$$acos$$(');
      processed = processed.replace(/atan\(/g, '$$atan$$(');
      processed = processed.replace(/ln\(/g, 'Math.log(');
      processed = processed.replace(/log\(/g, 'Math.log10(');
      processed = processed.replace(/√\(/g, 'Math.sqrt(');
      
      // Build evaluation function with custom trig
      const evalFunc = new Function('__sin', '__cos', '__tan', '__asin', '__acos', '__atan', 'Math',
        `try { return (${processed}); } catch(e) { return NaN; }`);
      
      const customSin = (x) => trigWrapper('sin', x);
      const customCos = (x) => trigWrapper('cos', x);
      const customTan = (x) => trigWrapper('tan', x);
      const customAsin = (x) => trigWrapper('asin', x);
      const customAcos = (x) => trigWrapper('acos', x);
      const customAtan = (x) => trigWrapper('atan', x);
      
      let result = evalFunc(customSin, customCos, customTan, customAsin, customAcos, customAtan, Math);
      if (isNaN(result) || !isFinite(result)) return "Error";
      // Format: remove trailing .0 if integer
      if (Math.abs(result - Math.round(result)) < 1e-12) return result.toFixed(0);
      return parseFloat(result.toFixed(10)).toString();
    }
    
    // Compute and show result in resultDiv
    function computeAndDisplay() {
      if (expression === "") {
        resultDiv.innerText = "0";
        return;
      }
      let res = evaluate(expression);
      if (res === "Error") resultDiv.innerText = "⚠️ Error";
      else resultDiv.innerText = res;
    }
    
    // Append to expression
    function append(val) {
      if (expression === "0" && /[0-9(]/.test(val)) {
        expression = val;
      } else {
        expression += val;
      }
      updateDisplay();
      computeAndDisplay();
    }
    
    // Clear everything
    function clearAll() {
      expression = "";
      updateDisplay();
      resultDiv.innerText = "0";
    }
    
    // Delete last character
    function deleteLast() {
      expression = expression.slice(0, -1);
      updateDisplay();
      computeAndDisplay();
    }
    
    // Add function like sin( , cos( etc
    function addFunction(fn) {
      append(fn + "(");
    }
    
    // Actions from buttons
    function performAction(action) {
      switch(action) {
        case 'sin': addFunction('sin'); break;
        case 'cos': addFunction('cos'); break;
        case 'tan': addFunction('tan'); break;
        case 'asin': addFunction('asin'); break;
        case 'acos': addFunction('acos'); break;
        case 'atan': addFunction('atan'); break;
        case 'ln': addFunction('ln'); break;
        case 'log': addFunction('log'); break;
        case 'sqrt': append('√('); break;
        case 'pow': append('^'); break;
        case 'fact': append('!'); break;
        case 'square': append('²'); break;
        case 'cube': append('³'); break;
        case 'equal':
          let res = evaluate(expression);
          if (res !== "Error" && !isNaN(parseFloat(res))) {
            expression = res;
            updateDisplay();
            resultDiv.innerText = expression;
          } else {
            resultDiv.innerText = "❗ Invalid";
          }
          break;
        case 'clear': clearAll(); break;
        case 'del': deleteLast(); break;
        default: break;
      }
    }
    
    // Memory functions
    function memStore() {
      let currentVal = resultDiv.innerText;
      if (currentVal !== "⚠️ Error" && currentVal !== "❗ Invalid" && !isNaN(parseFloat(currentVal))) {
        memory = parseFloat(currentVal);
      } else {
        let evalNow = evaluate(expression);
        if (evalNow !== "Error") memory = parseFloat(evalNow);
        else memory = 0;
      }
    }
    function memRecall() { append(memory.toString()); }
    function memPlus() {
      let currentVal = resultDiv.innerText;
      if (currentVal !== "⚠️ Error" && !isNaN(parseFloat(currentVal))) memory += parseFloat(currentVal);
      else {
        let evalNow = evaluate(expression);
        if (evalNow !== "Error") memory += parseFloat(evalNow);
      }
    }
    function memClear() { memory = 0; }
    
    // Toggle degree/radian
    function setDeg() {
      isDeg = true;
      document.getElementById('degMode').classList.add('active');
      document.getElementById('radMode').classList.remove('active');
      computeAndDisplay();
    }
    function setRad() {
      isDeg = false;
      document.getElementById('radMode').classList.add('active');
      document.getElementById('degMode').classList.remove('active');
      computeAndDisplay();
    }
    
    // --- Event Binding ---
    // Numbers
    document.querySelectorAll('[data-num]').forEach(btn => {
      btn.addEventListener('click', () => append(btn.getAttribute('data-num')));
    });
    // Operators
    document.querySelectorAll('[data-op]').forEach(btn => {
      btn.addEventListener('click', () => append(btn.getAttribute('data-op')));
    });
    // Parentheses
    document.querySelectorAll('[data-paren]').forEach(btn => {
      btn.addEventListener('click', () => append(btn.getAttribute('data-paren')));
    });
    // Constants
    document.querySelectorAll('[data-const]').forEach(btn => {
      btn.addEventListener('click', () => append(btn.getAttribute('data-const')));
    });
    // Functions (sin, cos, etc)
    document.querySelectorAll('[data-func]').forEach(btn => {
      btn.addEventListener('click', () => performAction(btn.getAttribute('data-func')));
    });
    // Actions (C, del, =)
    document.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => performAction(btn.getAttribute('data-action')));
    });
    // Memory buttons
    document.getElementById('memStore').addEventListener('click', memStore);
    document.getElementById('memRecall').addEventListener('click', memRecall);
    document.getElementById('memPlus').addEventListener('click', memPlus);
    document.getElementById('memClear').addEventListener('click', memClear);
    // Mode buttons
    document.getElementById('degMode').addEventListener('click', setDeg);
    document.getElementById('radMode').addEventListener('click', setRad);
    
    // Initial demo to show it works: sin(30) in DEG should give 0.5
    expression = "sin(30)";
    updateDisplay();
    computeAndDisplay();
  })();
</script>
</body>
</html>
